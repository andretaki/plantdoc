<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlantDoc - {{block "title" .}}Dashboard{{end}}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2/dist/tailwind.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-green-700 text-white p-4 shadow-lg">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold tracking-tight">PlantDoc</a>
            <a href="/upload" class="bg-green-500 hover:bg-green-400 px-4 py-2 rounded-lg font-medium transition-colors">
                + New Scan
            </a>
        </div>
    </nav>
    <main class="max-w-5xl mx-auto p-6">
        {{block "content" .}}{{end}}
    </main>
</body>
</html>
