{{define "assessment"}}
<div class="assessment-entry">
    <div class="assessment-dot"></div>
    <div class="assessment-card">
        <div class="assessment-card-inner">
            <img src="/photos/{{.ID}}" alt="Plant observation" class="assessment-photo">
            <div class="assessment-body">
                <div class="assessment-meta">
                    <span class="assessment-date">{{.CreatedAt.Format "2 Jan 2006, 3:04 PM"}}</span>
                    {{if ge .HealthScore 7}}
                    <span class="assessment-score score-high">{{.HealthScore}}/10</span>
                    {{else if ge .HealthScore 4}}
                    <span class="assessment-score score-mid">{{.HealthScore}}/10</span>
                    {{else}}
                    <span class="assessment-score score-low">{{.HealthScore}}/10</span>
                    {{end}}
                </div>
                <div class="assessment-section">
                    <div class="assessment-section-title">Diagnosis</div>
                    <p>{{.Diagnosis}}</p>
                </div>
                <div class="assessment-section">
                    <div class="assessment-section-title">Care Notes</div>
                    <p>{{.CareTips}}</p>
                </div>
            </div>
        </div>
    </div>
</div>
{{end}}
