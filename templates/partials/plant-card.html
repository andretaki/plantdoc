{{define "plant-card"}}
<a href="/plants/{{.Plant.ID}}" class="plant-card fade-in">
    {{if .LatestPhotoID}}
    <img src="/photos/{{.LatestPhotoID}}" alt="{{.Plant.Name}}" class="plant-card-img">
    {{else}}
    <div class="plant-card-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 22V8M12 8C12 8 7 3 3 6C-1 9 4 14 12 8ZM12 8C12 8 17 3 21 6C25 9 20 14 12 8Z"/>
            <path d="M8 22h8" stroke-linecap="round"/>
        </svg>
    </div>
    {{end}}
    <div class="plant-card-body">
        <div class="plant-card-name">{{.Plant.Name}}</div>
        {{if .Plant.CommonName}}
        <div class="plant-card-species">{{.Plant.CommonName}}</div>
        {{end}}
        {{if .HealthScore}}
        <div class="health-bar-wrap">
            <span class="health-bar-label">Health</span>
            <div class="health-bar">
                <div class="health-bar-fill" data-score="{{.HealthScore}}" style="width: {{mul .HealthScore 10}}%"></div>
            </div>
            <span class="health-score">{{.HealthScore}}/10</span>
        </div>
        {{end}}
    </div>
</a>
{{end}}
