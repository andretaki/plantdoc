{{define "title"}}New Scan{{end}}
{{define "content"}}
<div class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold text-gray-800 mb-6">Scan a Plant</h1>

    <form hx-post="/upload" hx-target="#result" hx-encoding="multipart/form-data"
          hx-indicator="#loading" class="space-y-6">

        <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center
                    hover:border-green-500 transition-colors cursor-pointer relative">
            <p class="text-4xl mb-3">&#128247;</p>
            <p class="text-gray-600 font-medium">Drop a plant photo here or click to browse</p>
            <p class="text-gray-400 text-sm mt-1">JPG, PNG up to 10MB</p>
            <input type="file" name="photo" accept="image/*" required
                   class="absolute inset-0 opacity-0 cursor-pointer"
                   onchange="previewImage(this)">
            <img id="preview" class="mx-auto mt-4 max-h-64 rounded-lg hidden">
        </div>

        {{if .Plants}}
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Add to existing plant (optional)</label>
            <select name="plant_id" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-green-500 focus:border-green-500">
                <option value="">New plant</option>
                {{range .Plants}}
                <option value="{{.Plant.ID}}"{{if $.SelectedPlant}}{{if eq .Plant.ID $.SelectedPlant.ID}} selected{{end}}{{end}}>{{.Plant.Name}}</option>
                {{end}}
            </select>
        </div>
        {{end}}

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Plant name (for new plants)</label>
            <input type="text" name="name" placeholder="e.g. Living Room Fern"
                   class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-green-500 focus:border-green-500">
            <p class="text-gray-400 text-sm mt-1">Leave blank to use AI-detected name</p>
        </div>

        <button type="submit"
                class="w-full bg-green-600 hover:bg-green-500 text-white py-3 rounded-lg font-medium text-lg transition-colors">
            Analyze Plant
        </button>
    </form>

    <div id="loading" class="htmx-indicator text-center py-8">
        <p class="text-lg text-gray-600 animate-pulse">Analyzing your plant...</p>
    </div>

    <div id="result" class="mt-6"></div>
</div>

<script>
function previewImage(input) {
    const preview = document.getElementById('preview');
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            preview.src = e.target.result;
            preview.classList.remove('hidden');
        };
        reader.readAsDataURL(input.files[0]);
    }
}
</script>
{{end}}
